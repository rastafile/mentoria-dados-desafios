version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: mentoria_postgres
    environment:
      POSTGRES_DB: mentoria_dados
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
