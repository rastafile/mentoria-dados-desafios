name: Pipeline de Dados

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mentoria_dados
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Aplicar DDL
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d mentoria_dados -f scripts/ddl/create_tables.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d mentoria_dados -f scripts/ddl/constraints.sql

      - name: Inserir dados
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d mentoria_dados -f scripts/dml/insert_customers.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d mentoria_dados -f scripts/dml/insert_products.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d mentoria_dados -f scripts/dml/insert_orders.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d mentoria_dados -f scripts/dml/insert_order_items.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d mentoria_dados -f scripts/dml/insert_payments.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d mentoria_dados -f scripts/dml/insert_shipments.sql

      - name: Executar pipeline
        run: python pipelines/nivel-avancado/desafio-11.py
        env:
          DB_URL: postgresql://postgres:postgres@localhost:5432/mentoria_dados

      - name: Executar validacoes
        run: python pipelines/nivel-avancado/desafio-14.py
        env:
          DB_URL: postgresql://postgres:postgres@localhost:5432/mentoria_dados

      - name: Executar testes
        run: python -m pytest tests/ || echo 'Nenhum teste encontrado'
        env:
          DB_URL: postgresql://postgres:postgres@localhost:5432/mentoria_dados
